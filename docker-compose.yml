services:

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php
        networks:
            - app

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            - .:/var/www/html
        environment:
            APP_ENV: ${APP_ENV:-dev}
            APP_SECRET: ${APP_SECRET:-changeme_32_chars_minimum}
            DATABASE_URL: "postgresql://${POSTGRES_USER:-chronosite}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-chronosite}?serverVersion=16&charset=utf8"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - app

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-chronosite}
            POSTGRES_USER: ${POSTGRES_USER:-chronosite}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronosite} -d ${POSTGRES_DB:-chronosite}"]
            interval: 3s
            timeout: 5s
            retries: 15
            start_period: 10s
        networks:
            - app

volumes:
    postgres_data:

networks:
    app:
        driver: bridge
